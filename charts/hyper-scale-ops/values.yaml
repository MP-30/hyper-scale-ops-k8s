# Number of pod replicas
replicaCount: 1

# Docker image configuration
image:
  repository: mp30/hyper-ops
  tag: latest
  pullPolicy: IfNotPresent

# Kubernetes Service
service:
  type: ClusterIP
  port: 80
  targetPort: 8000

# ConfigMap values
config:
  APP_ENV: development
  APP_NAME: Hyper Scale Ops
  LOG_LEVEL: INFO

# Ingress configuration
ingress:
  enabled: true
  className: nginx
  host: hyper.local
  path: /
  pathType: Prefix

# Resources (empty for now)
resources: {}

# Pod labels
labels: {}

# Pod annotations
annotations: {}
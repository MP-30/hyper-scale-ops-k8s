apiVersion: v1
kind: Service

metadata:
  name: {{ include "hyper-scale-ops.fullname" . }}
  labels:
    {{- include "hyper-scale-ops.labels" . | nindent 4 }}

spec:
  type: {{ .Values.service.type }}

  selector:
    {{- include "hyper-scale-ops.selectorLabels" . | nindent 4 }}

  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
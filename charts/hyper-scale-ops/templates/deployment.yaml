apiVersion: apps/v1
kind: Deployment

metadata:
  name: {{ include "hyper-scale-ops.fullname" . }}
  labels:
    {{- include "hyper-scale-ops.labels" . | nindent 4 }}

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      {{- include "hyper-scale-ops.selectorLabels" . | nindent 6 }}

  template:

    metadata:
      labels:
        {{- include "hyper-scale-ops.selectorLabels" . | nindent 8 }}

      annotations:

        vault.hashicorp.com/agent-inject: "true"

        vault.hashicorp.com/role: "hyper-role"

        vault.hashicorp.com/agent-inject-secret-config: "secret/data/hyper"

        vault.hashicorp.com/agent-inject-template-config: |
            {{`{{- with secret "secret/data/hyper" -}}
            DATABASE_URL={{ .Data.data.DATABASE_URL }}
            {{- end }}`}}

    spec:
      serviceAccountName: {{ include "hyper-scale-ops.fullname" . }}
      containers:

        - name: hyper-scale-ops

          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - containerPort: {{ .Values.service.targetPort }}

          envFrom:
            - configMapRef:
                name: {{ include "hyper-scale-ops.fullname" . }}

          resources:
            {{- toYaml .Values.resources | nindent 12 }}